<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noded — Loading…</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050810;
    color: #f0f4ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 24px;
  }
  .logo { font-size: 3rem; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }
  h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
  p  { color: #8892a4; font-size: 0.95rem; margin-bottom: 40px; }
  .dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 32px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #6366f1; animation: pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
  .dot:nth-child(3) { animation-delay: 0.4s; background: #a78bfa; }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%            { transform: scale(1.2); opacity: 1; }
  }
  .tip {
    font-size: 0.8rem; color: #4a5568;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 10px 20px; border-radius: 100px;
    background: rgba(255,255,255,0.03);
  }
</style>
<!-- Auto-refresh every 4 seconds until Streamlit is ready -->
<script>
  setTimeout(() => location.reload(), 4000);
</script>
</head>
<body>
  <div class="logo">✈️</div>
  <h1>Noded is waking up…</h1>
  <p>First load takes ~30 seconds. You'll be redirected automatically.</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="tip">💡 Tip: bookmark this page and it loads instantly next time</div>
</body>
</html>
